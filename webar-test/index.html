<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizontal Rotation WebAR Test</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./assets/tracking-files/targets.mind; filterMinCF: 0.001; filterBeta: 1000;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="cone" src="./assets/models/cone.glb"></a-asset-item>
        <a-asset-item id="cube" src="./assets/models/cube.glb"></a-asset-item>
        <a-asset-item id="sphere" src="./assets/models/sphere.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" camera="near: 0.01; far: 10000;"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="model-0"
          src="#cone"
          rotation="0 0 0" 
          position="0 0 0.1" 
          scale="1 1 1">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model 
          id="model-1"
          src="#cube"
          rotation="0 0 0" 
          position="0 0 0.1" 
          scale="1 1 1">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model 
          id="model-2"
          src="#sphere"
          rotation="0 0 0" 
          position="0 0 0.1" 
          scale="1 1 1">
        </a-gltf-model>
      </a-entity>

    </a-scene>

    <script>
      let isDragging = false;
      let previousTouchX = 0;
      const rotationSpeed = 0.5; // Adjust this number to make it spin faster or slower

      // Listen for screen touch initiation
      window.addEventListener('touchstart', (e) => {
        isDragging = true;
        previousTouchX = e.touches[0].clientX;
      });

      // Listen for finger dragging across the glass screen
      window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;

        // Calculate horizontal distance covered by finger swipe
        const currentTouchX = e.touches[0].clientX;
        const deltaX = currentTouchX - previousTouchX;
        previousTouchX = currentTouchX;

        // Apply horizontal rotation change to all 3 models seamlessly
        for (let i = 0; i <= 2; i++) {
          const model = document.getElementById(`model-${i}`);
          if (model) {
            // Fetch current rotation object states
            let currentRotation = model.getAttribute('rotation');
            
            // Modify ONLY the Y axis (Horizontal panning plane rotation)
            currentRotation.y += deltaX * rotationSpeed;
            
            // Push updated spatial attributes back to the DOM element
            model.setAttribute('rotation', currentRotation);
          }
        }
      });

      // Reset state tracking when finger leaves the glass display interface
      window.addEventListener('touchend', () => {
        isDragging = false;
      });
    </script>
  </body>
</html>
